name: CI

# Когда запускать: при пуше и пул-реквесте в любую ветку
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Ставим Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Проверяем код линтером
      - name: Lint with ruff
        run: ruff check app/

      # 5. Прогоняем тесты
      - name: Run tests
        run: python -m pytest