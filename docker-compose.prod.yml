# Полный production-конфиг. Запуск на сервере:
# docker compose -f docker-compose.prod.yml up -d --build
services:

  # -----------------------------------------------------------------------
  # migrate: применяет миграции БД перед стартом приложения.
  # Запускается один раз и завершается. app стартует только после него.
  # -----------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # -----------------------------------------------------------------------
  # app: основное FastAPI-приложение (4 воркера uvicorn)
  # -----------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "127.0.0.1:8000:8000"   # только localhost; наружу отдаёт nginx
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always
    volumes:
      - uploads_data:/code/app/static/uploads

  # -----------------------------------------------------------------------
  # worker: фоновые задачи (письма, уведомления) через arq + Redis
  # -----------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always

  # -----------------------------------------------------------------------
  # db: PostgreSQL 16
  # -----------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # порт НЕ пробрасываем наружу — база только внутри Docker-сети
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # -----------------------------------------------------------------------
  # redis: очередь задач и кэш корзины
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    # порт НЕ пробрасываем наружу
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
  uploads_data: