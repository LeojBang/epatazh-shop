<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Эпатаж{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="logo" href="/">Эпатаж</a>
            <nav>
                <a href="/catalog">Каталог</a>
                <a href="/cart">Корзина</a>
                {% if user %}
<a href="/account" class="nav-user">{{ user.full_name or user.email }}</a>
                <a href="/account/orders">Заказы</a>
                    <form action="/logout" method="post" class="inline-form">
                        <button type="submit" class="link-button" style="color: var(--text-on-dark);">Выйти</button>
                    </form>
                {% else %}
                    <a href="/login">Войти</a>
                    <a href="/register">Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Эпатаж — экипировка для единоборств · {{ "2026" }}</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
