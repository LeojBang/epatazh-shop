{% extends "base.html" %}
{% block title %}Регистрация — Эпатаж{% endblock %}
{% block content %}
    <div class="auth-card">
        <h1>Регистрация</h1>
        {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
        <form method="post" action="/register" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <label for="full_name">Имя</label>
            <input type="text" id="full_name" name="full_name">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required minlength="8">
            <label class="consent">
                <input type="checkbox" name="consent" required>
                <span>Я согласен с <a href="/info/privacy" target="_blank" rel="noopener">политикой конфиденциальности</a> и обработкой персональных данных</span>
            </label>
            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>
        <p class="form-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
{% endblock %}
