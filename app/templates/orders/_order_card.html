<a href="/account/orders/{{ order.id }}" class="order-card order-card--link">
    <div class="order-header">
        <span>Заказ от {{ order.created_at | msk_datetime }}</span>
        <span class="order-status">{{ order.status | order_status_ru }}</span>
    </div>
    <p class="order-card-summary">
        {{ order.items|length }} {{ order.items|length | plural_ru("товар", "товара", "товаров") }} на {{ "%.2f"|format(order.total) }} ₽
    </p>
    <span class="order-card-more">Подробнее →</span>
</a>
